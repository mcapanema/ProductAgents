[project]
name = "productagents-core"
version = "0.1.0"
description = "ProductAgents canonical models and shared infrastructure."
requires-python = ">=3.14"
dependencies = ["pydantic>=2.7", "python-dotenv>=1.0"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/productagents"]
