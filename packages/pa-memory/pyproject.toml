[project]
name = "productagents-memory"
version = "0.1.0"
description = "ProductAgents organizational memory subsystem."
requires-python = ">=3.14"
dependencies = [
    "productagents-core",
    "sqlalchemy[asyncio]>=2.0.51",
    "aiosqlite>=0.20",
    "alembic>=1.14",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/productagents"]

[tool.uv.sources]
productagents-core = { workspace = true }
