[project]
name = "productagents-knowledge"
version = "0.1.0"
description = "ProductAgents knowledge services (the platform API)."
requires-python = ">=3.14"
dependencies = ["productagents-core"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/productagents"]

[tool.uv.sources]
productagents-core = { workspace = true }
