[project]
name = "productagents-platform"
version = "0.1.0"
description = "Application Services + Event Bus — the stable API of the ProductAgents platform."
requires-python = ">=3.14"
dependencies = [
    "productagents-core",
    "productagents-agents",
    "productagents-memory",
    "productagents-connectors",
    "pydantic>=2.7",
    "python-dotenv>=1.0",
    "pyyaml>=6",
]

[project.entry-points."productagents.workflows"]
evaluate_initiative = "productagents.platform.workflow:build_evaluate_initiative"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/productagents"]
