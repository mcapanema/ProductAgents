[project]
name = "productagents-connectors"
version = "0.1.0"
description = "ProductAgents connector framework and first-party connectors."
requires-python = ">=3.14"
dependencies = ["productagents-core", "httpx>=0.27"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/productagents"]

[tool.uv.sources]
productagents-core = { workspace = true }
