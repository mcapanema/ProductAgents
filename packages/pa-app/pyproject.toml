[project]
name = "productagents-app"
version = "0.1.0"
description = "ProductAgents Textual TUI and CLI edges."
requires-python = ">=3.14"
dependencies = [
    "productagents-core",
    "productagents-agents",
    "productagents-knowledge",
    "productagents-memory",
    "productagents-connectors",
    "textual>=4.0",
    "pyyaml>=6",
    "websockets>=15",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/productagents"]

[tool.uv.sources]
productagents-core = { workspace = true }
productagents-agents = { workspace = true }
productagents-knowledge = { workspace = true }
productagents-memory = { workspace = true }
productagents-connectors = { workspace = true }
