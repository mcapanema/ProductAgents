[project]
name = "productagents-app"
version = "0.1.0"
description = "ProductAgents CLI and IPC edges."
requires-python = ">=3.14"
dependencies = [
    "productagents-core",
    "productagents-platform",
    "websockets>=15",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/productagents"]

[tool.uv.sources]
productagents-core = { workspace = true }
productagents-platform = { workspace = true }
