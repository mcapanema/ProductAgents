name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint
        run: uv run --frozen ruff check .

      - name: Format check
        run: uv run --frozen ruff format --check .

      - name: Import-layer contracts
        run: uv run --frozen lint-imports

      - name: Design contrast gate
        run: python3 design/contrast.py

      - name: Test
        run: uv run --frozen pytest

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Type check
        run: uv run --frozen ty check

  security:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Dependency vulnerability audit (pip-audit)
        run: |
          uv export --frozen --no-dev --no-emit-project --no-hashes -o "$RUNNER_TEMP/requirements-prod.txt"
          uvx pip-audit@2.10.1 --no-deps -r "$RUNNER_TEMP/requirements-prod.txt"

      - name: Static security analysis (bandit)
        run: uv run --frozen bandit -c pyproject.toml -r packages

      - name: Secret scan (gitleaks)
        run: |
          docker run --rm -v "${{ github.workspace }}:/repo" \
            ghcr.io/gitleaks/gitleaks:v8.30.1 dir /repo --redact --no-banner

  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Check out the repository
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Unit tests (Vitest)
        run: npm test

      - name: Typecheck + production build
        run: npm run build
