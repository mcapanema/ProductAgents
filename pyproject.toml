[project]
name = "productagents"
version = "0.1.0"
description = "Multi-agent framework for product decision-making under uncertainty."
requires-python = ">=3.14"
dependencies = [
    "langgraph>=0.6",
    "langchain>=1.0",
    "langchain-anthropic>=0.3",
    "textual>=4.0",
    "pydantic>=2.7",
]

[project.scripts]
productagents = "productagents.tui.app:main"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/productagents"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=productagents --cov-report=term-missing --cov-report=html"

[tool.coverage.run]
branch = true
source = ["productagents"]

[tool.coverage.report]
show_missing = true
