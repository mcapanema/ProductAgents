[project]
name = "productagents"
version = "0.1.0"
description = "Multi-agent framework for product decision-making under uncertainty."
requires-python = ">=3.14"
dependencies = [
    "langgraph>=0.6",
    "langchain>=1.0",
    "langchain-anthropic>=0.3",
    "textual>=4.0",
    "pydantic>=2.7",
]

[project.scripts]
productagents = "productagents.tui.app:main"

[dependency-groups]
dev = [
    "pytest>=8",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5",
    "ruff>=0.15.18",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/productagents"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
addopts = "--cov=productagents --cov-report=term-missing --cov-report=html --cov-fail-under=90"

[tool.coverage.run]
branch = true
source = ["productagents"]

[tool.coverage.report]
show_missing = true

[tool.ruff]
line-length = 88
# target-version is inferred from project.requires-python (>=3.14).

[tool.ruff.lint]
# Curated, explicit rule set. The default ruff selection is nearly empty;
# this locks in the rules the codebase was already written against (note the
# existing `# noqa: BLE001` suppressions).
#
# `TC` (flake8-type-checking) is intentionally EXCLUDED: moving Pydantic
# field-type imports into `if TYPE_CHECKING:` blocks breaks Pydantic's
# runtime annotation evaluation (see schemas.py).
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort (import sorting)
    "UP",  # pyupgrade
    "B",   # flake8-bugbear
    "C4",  # flake8-comprehensions
    "SIM", # flake8-simplify
    "BLE", # flake8-blind-except (makes the existing `# noqa: BLE001` meaningful)
    "RUF", # ruff-specific rules
    "PT",  # flake8-pytest-style
]
